name: Deploy CSA - CatIA Super App

on:
  push:
    branches: [main]

jobs:
  validate:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test

  build-push:
    name: Build & Push Images
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: .
            image: portal
          - context: ./health-checker
            image: health-checker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
        if: vars.REGISTRY_URL != ''

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ vars.REGISTRY_URL != '' }}
          tags: |
            ${{ vars.REGISTRY_URL }}/cateno/${{ matrix.image }}:${{ github.sha }}
            ${{ vars.REGISTRY_URL }}/cateno/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build-push
    runs-on: ubuntu-latest
    if: vars.DEPLOY_HOST != ''
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_PATH }}
            git pull origin main
            docker compose --profile production pull
            docker compose --profile production up -d --remove-orphans
