# ═══════════════════════════════════════════
# Portal Cateno — Docker Compose (desenvolvimento + produção)
# ═══════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-cateno-db
    environment:
      POSTGRES_USER: cateno
      POSTGRES_PASSWORD: cateno_dev
      POSTGRES_DB: portal_cateno
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cateno -d portal_cateno']
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: portal-cateno-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - '8080:8080'
    volumes:
      - ./keycloak/cateno-realm.json:/opt/keycloak/data/import/cateno-realm.json:ro
      - keycloak_data:/opt/keycloak/data

  migrate:
    build: .
    container_name: portal-cateno-migrate
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://cateno:cateno_dev@postgres:5432/portal_cateno?schema=public
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy

  portal:
    build: .
    container_name: portal-cateno-portal
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://cateno:cateno_dev@postgres:5432/portal_cateno?schema=public
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-in-production}
      AUTH_KEYCLOAK_ID: portal-cateno
      AUTH_KEYCLOAK_SECRET: portal-cateno-dev-secret
      AUTH_KEYCLOAK_ISSUER: http://keycloak:8080/realms/cateno
      HEALTH_CHECKER_SECRET: ${HEALTH_CHECKER_SECRET:-health-checker-dev-secret}
    command: node server.js
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
    profiles:
      - production # Em dev, roda com `npm run dev` fora do Docker

  health-checker:
    build: ./health-checker
    container_name: portal-cateno-health-checker
    environment:
      PORTAL_URL: http://portal:3000
      HEALTH_CHECKER_SECRET: ${HEALTH_CHECKER_SECRET:-health-checker-dev-secret}
      CHECK_INTERVAL_SECONDS: 30
      CONCURRENCY_LIMIT: 10
    restart: unless-stopped
    depends_on:
      - postgres

  caddy:
    image: caddy:2-alpine
    container_name: portal-cateno-caddy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    profiles:
      - production # Sobe apenas com: docker compose --profile production up -d

  langflow:
    image: langflowai/langflow:latest
    container_name: portal-cateno-langflow
    ports:
      - '7860:7860'
    volumes:
      - langflow_data:/app/langflow
    environment:
      - LANGFLOW_DATABASE_URL=sqlite:///./langflow/langflow.db
    profiles:
      - ai # Sobe apenas com: docker compose --profile ai up -d

volumes:
  postgres_data:
  keycloak_data:
  caddy_data:
  caddy_config:
  langflow_data:
