# ═══════════════════════════════════════════
# Portal Cateno — Docker Compose (desenvolvimento)
# ═══════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-cateno-db
    environment:
      POSTGRES_USER: cateno
      POSTGRES_PASSWORD: cateno_dev
      POSTGRES_DB: portal_cateno
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: portal-cateno-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - '8080:8080'
    volumes:
      - ./keycloak/cateno-realm.json:/opt/keycloak/data/import/cateno-realm.json:ro
      - keycloak_data:/opt/keycloak/data

  langflow:
    image: langflowai/langflow:latest
    container_name: portal-cateno-langflow
    ports:
      - '7860:7860'
    volumes:
      - langflow_data:/app/langflow
    environment:
      - LANGFLOW_DATABASE_URL=sqlite:///./langflow/langflow.db
    profiles:
      - ai # Sobe apenas com: docker compose --profile ai up -d

volumes:
  postgres_data:
  keycloak_data:
  langflow_data:
