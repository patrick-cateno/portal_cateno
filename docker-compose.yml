# ═══════════════════════════════════════════
# CSA - CatIA Super App — Docker Compose (desenvolvimento + produção)
# ═══════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: csa-db
    environment:
      POSTGRES_USER: cateno
      POSTGRES_PASSWORD: cateno_dev
      POSTGRES_DB: csa
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cateno -d csa']
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: csa-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - '8080:8080'
    volumes:
      - ./keycloak/cateno-realm.json:/opt/keycloak/data/import/cateno-realm.json:ro
      - keycloak_data:/opt/keycloak/data

  migrate:
    build:
      context: .
      target: migrate
    container_name: csa-migrate
    environment:
      DATABASE_URL: postgresql://cateno:cateno_dev@postgres:5432/csa?schema=public
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy

  portal:
    build:
      context: .
      target: runtime
    container_name: csa-portal
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://cateno:cateno_dev@postgres:5432/csa?schema=public
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-in-production}
      AUTH_KEYCLOAK_ID: csa
      AUTH_KEYCLOAK_SECRET: csa-dev-secret
      AUTH_KEYCLOAK_ISSUER: http://keycloak:8080/realms/cateno
      HEALTH_CHECKER_SECRET: ${HEALTH_CHECKER_SECRET:-health-checker-dev-secret}
    command: node server.js
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
    profiles:
      - production # Em dev, roda com `npm run dev` fora do Docker

  health-checker:
    build: ./health-checker
    container_name: csa-health-checker
    environment:
      PORTAL_URL: ${PORTAL_URL:-http://host.docker.internal:3000}
      HEALTH_CHECKER_SECRET: ${HEALTH_CHECKER_SECRET:-health-checker-dev-secret}
      CHECK_INTERVAL_SECONDS: 30
      CONCURRENCY_LIMIT: 10
    restart: unless-stopped
    depends_on:
      - postgres

  # ── Kong Database ──────────────────────────────────────
  kong-db:
    image: postgres:16-alpine
    container_name: csa-kong-db
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev_password}
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'kong']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Kong Migration ─────────────────────────────────────
  kong-migration:
    image: kong:3.9
    container_name: csa-kong-migration
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev_password}
    depends_on:
      kong-db:
        condition: service_healthy
    restart: on-failure

  # ── Kong Gateway ───────────────────────────────────────
  kong:
    image: kong:3.9
    container_name: csa-kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong_dev_password}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - '8000:8000'    # proxy — Caddy aponta aqui em produção
      - '8001:8001'    # admin API — apenas dev (em prod, remover esta linha)
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'kong', 'health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: csa-caddy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    profiles:
      - production # Sobe apenas com: docker compose --profile production up -d

  langflow:
    image: langflowai/langflow:latest
    container_name: csa-langflow
    ports:
      - '7860:7860'
    volumes:
      - langflow_data:/app/langflow
    environment:
      - LANGFLOW_DATABASE_URL=sqlite:///./langflow/langflow.db
    profiles:
      - ai # Sobe apenas com: docker compose --profile ai up -d

volumes:
  postgres_data:
  keycloak_data:
  kong_data:
  caddy_data:
  caddy_config:
  langflow_data:
